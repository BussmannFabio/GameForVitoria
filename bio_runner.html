<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioRunner: Jornada pelo Corpo Humano</title>
    <!-- Google Fonts Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS Style Sheet -->
    <link rel="stylesheet" href="jogos/bio_runner/css/estilo.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <!-- Botão Flutuante de Tela Cheia -->
        <button id="fullscreen-btn" onclick="toggleFullscreen()" class="absolute top-4 right-4 bg-slate-900/80 border border-slate-700 hover:bg-slate-800 text-slate-300 p-2.5 rounded-2xl shadow-md transition-transform active:scale-95 flex items-center justify-center z-40" title="Tela Cheia">
            <i id="fullscreen-icon" data-lucide="maximize" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- Device Rotation Alert Overlay -->
    <div id="rotate-overlay" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#05070f] text-white text-center p-6">
        <div class="animate-bounce text-6xl mb-4">📱🔄</div>
        <h2 class="text-2xl font-black mb-2 text-rose-400">Gire o seu aparelho!</h2>
        <p class="text-slate-400 max-w-sm">Para uma melhor experiência de jogo, gire o seu celular para a horizontal (modo paisagem).</p>
    </div>

    <!-- Game Engine Configs -->
    <script>
        // Global Game States enum
        const STATES = {
            MENU: 'menu',
            PLAYING: 'playing',
            QUIZ: 'quiz',
            GAMEOVER: 'gameover',
            VICTORY: 'victory'
        };

        // World Definitions
        const WORLDS = [
            { name: 'Sistema Circulatório', bgTop: '#1a000d', bgBot: '#450012', platColor: '#881337', accent: '#f43f5e', text: 'Mundo 1: Circulatório' },
            { name: 'Sistema Digestivo', bgTop: '#13001f', bgBot: '#2b0054', platColor: '#581c87', accent: '#c084fc', text: 'Mundo 2: Digestivo' },
            { name: 'Sistema Respiratório', bgTop: '#001324', bgBot: '#00335c', platColor: '#0369a1', accent: '#38bdf8', text: 'Mundo 3: Respiratório' }
        ];
    </script>

    <!-- Project Modular Files (OOP) -->
    <script src="jogos/bio_runner/js/audio.js"></script>
    <script src="jogos/bio_runner/js/controles.js"></script>
    <script src="jogos/bio_runner/js/entidades.js"></script>
    <script src="jogos/bio_runner/js/quiz.js"></script>
    <script src="jogos/bio_runner/js/interface.js"></script>
    <script src="jogos/bio_runner/js/jogo.js"></script>

    <!-- DOM Fullscreen Handlers -->
    <script>
        function toggleFullscreen() {
            const icon = document.getElementById('fullscreen-icon');
            const docEl = document.documentElement;
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                const req = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
                if (req) {
                    try {
                        const promise = req.call(docEl);
                        if (promise && promise.then) {
                            promise.then(() => {
                                if (icon) icon.setAttribute('data-lucide', 'minimize');
                                lucide.createIcons();
                            }).catch(err => console.log(err));
                        } else {
                            if (icon) icon.setAttribute('data-lucide', 'minimize');
                            lucide.createIcons();
                        }
                    } catch(e) { console.log(e); }
                }
            } else {
                const exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
                if (exit) {
                    try {
                        const promise = exit.call(document);
                        if (promise && promise.then) {
                            promise.then(() => {
                                if (icon) icon.setAttribute('data-lucide', 'maximize');
                                lucide.createIcons();
                            }).catch(err => console.log(err));
                        } else {
                            if (icon) icon.setAttribute('data-lucide', 'maximize');
                            lucide.createIcons();
                        }
                    } catch(e) { console.log(e); }
                }
            }
        }

        function updateFullscreenIcon() {
            const icon = document.getElementById('fullscreen-icon');
            if (icon) {
                if (document.fullscreenElement || document.webkitFullscreenElement) {
                    icon.setAttribute('data-lucide', 'minimize');
                } else {
                    icon.setAttribute('data-lucide', 'maximize');
                }
                lucide.createIcons();
            }
        }

        document.addEventListener('fullscreenchange', updateFullscreenIcon);
        document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const isFullscreenSupported = !!(
                document.documentElement.requestFullscreen ||
                document.documentElement.webkitRequestFullscreen ||
                document.documentElement.mozRequestFullScreen ||
                document.documentElement.msRequestFullscreen
            );
            if (!isFullscreenSupported) {
                const btn = document.getElementById('fullscreen-btn');
                if (btn) btn.classList.add('hidden');
            }

            // Start the game once DOM and modules are loaded
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            window.gameInstance = new Game(canvas, ctx);
        });
    </script>
</body>
</html>
