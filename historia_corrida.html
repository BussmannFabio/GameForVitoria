<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HistóriaCorrida: Fuga pelo Tempo</title>
    <!-- Google Fonts Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #04080f;
            margin: 0;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #04080f;
        }
        canvas {
            display: block;
            background-color: #0b0f19;
            box-shadow: 0 10px 40px rgba(0,0,0,0.85);
            border: 2px solid #1e293b;
            border-radius: 16px;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>

    <!-- Device Rotation Alert Overlay -->
    <div id="rotate-overlay" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#04080f] text-white text-center p-6">
        <div class="animate-bounce text-6xl mb-4">📱🔄</div>
        <h2 class="text-2xl font-black mb-2 text-rose-400">Gire o seu aparelho!</h2>
        <p class="text-slate-400 max-w-sm">Para uma melhor experiência de jogo, gire o seu celular para a horizontal (modo paisagem).</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // State Machine
        const STATES = {
            MENU: 'menu',
            PLAYING: 'playing',
            PORTAL_QUIZ: 'portal_quiz',
            GAMEOVER: 'gameover',
            VICTORY: 'victory'
        };
        let gameState = STATES.MENU;

        // Sound Synthesis (Web Audio API)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            try {
                initAudio();
                const now = audioCtx.currentTime;
                
                if (type === 'jump') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(180, now);
                    osc.frequency.exponentialRampToValueAtTime(700, now + 0.12);
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.12);
                    osc.start(now);
                    osc.stop(now + 0.12);
                } else if (type === 'collect') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.setValueAtTime(659.25, now + 0.08); // E5
                    osc.frequency.setValueAtTime(783.99, now + 0.16); // G5
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } else if (type === 'hit') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(100, now);
                    osc.frequency.linearRampToValueAtTime(30, now + 0.25);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now);
                    osc.stop(now + 0.25);
                } else if (type === 'correct') {
                    const notes = [392.00, 523.25, 659.25, 783.99, 1046.50]; // G4, C5, E5, G5, C6
                    notes.forEach((freq, idx) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(freq, now + idx * 0.06);
                        gain.gain.setValueAtTime(0.12, now + idx * 0.06);
                        gain.gain.linearRampToValueAtTime(0.01, now + idx * 0.06 + 0.15);
                        osc.start(now + idx * 0.06);
                        osc.stop(now + idx * 0.06 + 0.15);
                    });
                } else if (type === 'wrong') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(80, now + 0.4);
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                } else if (type === 'erachange') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.5);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now);
                    osc.stop(now + 0.5);
                } else if (type === 'gameover') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(180, now);
                    osc.frequency.linearRampToValueAtTime(40, now + 0.7);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.7);
                    osc.start(now);
                    osc.stop(now + 0.7);
                } else if (type === 'victory') {
                    // Samba-inspired chime fanfare
                    const notes = [261.63, 329.63, 392.00, 329.63, 392.00, 523.25, 659.25, 783.99];
                    notes.forEach((freq, idx) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now + idx * 0.12);
                        gain.gain.setValueAtTime(0.15, now + idx * 0.12);
                        gain.gain.linearRampToValueAtTime(0.01, now + idx * 0.12 + 0.2);
                        osc.start(now + idx * 0.12);
                        osc.stop(now + idx * 0.12 + 0.2);
                    });
                }
            } catch (e) {
                console.log("Audio Context initialization block: ", e);
            }
        }

        // Era Specifications
        const ERAS = [
            {
                name: 'Brasil Pré-Colonial',
                period: 'Antes de 1500',
                bgTop: '#0a1a08',
                bgBot: '#1a3a10',
                platColor: '#2d5a1b',
                accent: '#22c55e',
                accentHue: 120,
                npcFact: '🌿 Existiam mais de 1.000 povos indígenas no Brasil antes de 1500!',
                particle: 'leaf'
            },
            {
                name: 'Brasil Colonial',
                period: '1500 – 1822',
                bgTop: '#1a0f00',
                bgBot: '#3d2200',
                platColor: '#78350f',
                accent: '#f59e0b',
                accentHue: 35,
                npcFact: '⛵ Cabral chegou em 22 de abril de 1500 em Porto Seguro, na Bahia!',
                particle: 'ship'
            },
            {
                name: 'Brasil Império',
                period: '1822 – 1889',
                bgTop: '#0f0a1a',
                bgBot: '#1e103a',
                platColor: '#4c1d95',
                accent: '#fbbf24',
                accentHue: 45,
                npcFact: '☕ O café financiou cerca de 70% de toda a economia imperial!',
                particle: 'star'
            },
            {
                name: 'Brasil República',
                period: '1889 – hoje',
                bgTop: '#0a0f1a',
                bgBot: '#1a2540',
                platColor: '#1e3a5f',
                accent: '#60a5fa',
                accentHue: 210,
                npcFact: '🏙️ Brasília foi construída e inaugurada em apenas 41 meses!',
                particle: 'gear'
            }
        ];

        // Quiz Questions Data (4 questions per Era)
        const ERA_QUESTIONS = [
            // Era 1 - Pré-Colonial
            [
                { q: "Qual povo habitava o Brasil antes da chegada dos portugueses?", opts: ["Astecas", "Tupinambás e outros povos indígenas", "Maias", "Incas"], correct: 1 },
                { q: "O que significa o termo indígena 'Pindorama'?", opts: ["Terra das Palmeiras", "Terra do Ouro", "Mar Sem Fim", "Floresta Escura"], correct: 0 },
                { q: "Quais eram as principais atividades dos povos pré-coloniais?", opts: ["Comércio de navios", "Caça, pesca e agricultura de subsistência", "Mineração de diamantes", "Metalurgia industrial"], correct: 1 },
                { q: "Que tipo de preservação cultural tinham os povos nativos?", opts: ["Livros encadernados", "Tradição oral e pinturas pictográficas", "Inscrições em placas de bronze", "Registros digitais"], correct: 1 }
            ],
            // Era 2 - Colonial
            [
                { q: "Em que ano a frota de Pedro Álvares Cabral aportou no Brasil?", opts: ["1492", "1500", "1530", "1620"], correct: 1 },
                { q: "Qual foi o primeiro produto explorado economicamente pelos portugueses?", opts: ["Café", "Pau-brasil", "Ouro", "Borracha"], correct: 1 },
                { q: "Como se chamavam as faixas de terras distribuídas para colonizar?", opts: ["Capitanias Hereditárias", "Sesmarias Privadas", "Províncias Federais", "Zonas Francas"], correct: 0 },
                { q: "De onde vinham a maioria dos escravizados no período colonial?", opts: ["Ásia Oriental", "Europa do Sul", "África", "América Central"], correct: 2 }
            ],
            // Era 3 - Império
            [
                { q: "Quem proclamou a Independência do Brasil em 7 de setembro de 1822?", opts: ["Dom João VI", "Dom Pedro I", "Dom Pedro II", "Tiradentes"], correct: 1 },
                { q: "Qual produto agrícola liderou a economia do Brasil Império?", opts: ["Café", "Açúcar de cana", "Algodão", "Trigo"], correct: 0 },
                { q: "O que declarava a Lei Áurea, assinada pela Princesa Isabel em 1888?", opts: ["A Proclamação da República", "A Abolição da escravidão", "A Independência nacional", "O Voto feminino"], correct: 1 },
                { q: "Quem foi o mártir Tiradentes, executado no período anterior ao Império?", opts: ["Líder da Inconfidência Mineira", "Imperador coroado", "General da Marinha", "Governador Geral"], correct: 0 }
            ],
            // Era 4 - República
            [
                { q: "Em que dia e ano foi proclamada a República do Brasil?", opts: ["7 de Setembro de 1822", "15 de Novembro de 1889", "13 de Maio de 1888", "21 de Abril de 1960"], correct: 1 },
                { q: "Qual presidente é conhecido por impulsionar as indústrias de base?", opts: ["Deodoro da Fonseca", "Getúlio Vargas", "Juscelino Kubitschek", "Prudente de Morais"], correct: 1 },
                { q: "Qual cidade do centro-oeste tornou-se a nova capital federal em 1960?", opts: ["Rio de Janeiro", "São Paulo", "Brasília", "Salvador"], correct: 2 },
                { q: "O que representou a Semana de Arte Moderna de 1922?", opts: ["Uma revolta militar", "Revolução cultural, artística e modernista", "Fim da ditadura", "Abertura dos portos"], correct: 1 }
            ]
        ];

        // Game state variables
        let currentEra = 0; // 0 to 3
        let score = 0;
        let lives = 3;
        let scrollsCollected = 0; // needs 3 to active portal
        let gameTime = 0;

        // Player physics
        const player = {
            x: 80,
            y: 300,
            w: 24,
            h: 30,
            vx: 0,
            vy: 0,
            onGround: false,
            doubleJumpAvailable: true,
            invincibleTimer: 0
        };

        const PHYSICS = {
            gravity: 0.54,
            jumpForce: -12.0,
            moveSpeed: 4.4,
            friction: 0.82
        };

        // Inputs
        const keys = {};
        let touchControls = {
            left: false,
            right: false,
            jump: false
        };
        let isMobile = false;

        // Entities arrays
        let platforms = [];
        let enemies = [];
        let scrolls = [];
        let spikes = [];
        let npc = { x: 260, y: 350, w: 20, h: 32, fact: '' };
        let portal = { x: 3050, y: 310, w: 60, h: 90, active: false };

        // Particles
        let particles = [];
        function createParticles() {
            particles = [];
            for (let i = 0; i < 25; i++) {
                particles.push({
                    x: Math.random() * 800,
                    y: Math.random() * 450,
                    size: 2 + Math.random() * 5,
                    vx: -0.3 - Math.random() * 0.6,
                    vy: (Math.random() - 0.5) * 0.2,
                    rot: Math.random() * Math.PI,
                    rotSpeed: (Math.random() - 0.5) * 0.05
                });
            }
        }

        // Quiz Portal Overlay
        let activeQuiz = null;
        let quizTimer = 30;
        let quizTimerStart = 0;
        let selectedOption = -1;
        let showFeedbackTimer = 0;
        let feedbackCorrect = false;

        // Level builder
        const LEVEL_WIDTH = 3200;

        function loadLevel(eraIdx) {
            platforms = [];
            enemies = [];
            scrolls = [];
            spikes = [];
            scrollsCollected = 0;
            portal.active = false;

            const era = ERAS[eraIdx];

            // Base ground
            platforms.push({ x: 0, y: 390, w: 500, h: 60, type: 'ground' });

            // Set NPC Guide
            npc.x = 240;
            npc.y = 390 - 32;
            npc.fact = era.npcFact;

            // Simple deterministic LCG random generator based on era
            let randomVal = eraIdx * 456 + 99;
            function rand() {
                randomVal = (randomVal * 9301 + 49297) % 233280;
                return randomVal / 233280;
            }

            // Generate levels chunks
            let nextX = 500;
            while (nextX < 2900) {
                const step = rand();
                const gap = 80 + step * 80;
                const platW = 150 + rand() * 150;
                const platY = 240 + Math.floor(rand() * 4) * 40; // 240, 280, 320, 360

                platforms.push({ x: nextX + gap, y: platY, w: platW, h: 450 - platY, type: 'platform' });

                // Spikes
                if (rand() > 0.4 && gap > 100) {
                    spikes.push({ x: nextX + 10, y: 430, w: gap - 20, h: 20 });
                }

                // Enemies per Era
                if (rand() > 0.4) {
                    let eType = 'patrol';
                    if (eraIdx === 0) eType = 'onca';
                    if (eraIdx === 1) eType = 'mosquito';
                    if (eraIdx === 2) eType = 'guard';
                    if (eraIdx === 3) eType = 'car';

                    enemies.push({
                        x: nextX + gap + 30,
                        y: platY - 26,
                        w: eType === 'car' ? 32 : 24,
                        h: 24,
                        type: eType,
                        patrolMin: nextX + gap + 5,
                        patrolMax: nextX + gap + platW - 35,
                        dir: 1,
                        vx: eType === 'mosquito' ? 1.6 : eType === 'onca' ? 2.2 : 1.5,
                        vy: 0,
                        phase: rand() * Math.PI
                    });
                }

                nextX += gap + platW;
            }

            // End flat land
            platforms.push({ x: 2900, y: 390, w: 300, h: 60, type: 'ground' });

            // Set Portal
            portal.x = 3080;
            portal.y = 390 - 80;
            portal.w = 50;
            portal.h = 80;

            // Distribute 3 Scrolls in hard to reach heights
            // Scroll 1: around x=900, Scroll 2: around x=1700, Scroll 3: around x=2500
            const scrollXs = [900, 1700, 2500];
            scrollXs.forEach(sx => {
                // Find a platform near sx
                let nearestPlat = platforms.find(p => p.x > sx - 200 && p.x < sx + 200);
                if (!nearestPlat) nearestPlat = platforms[2]; // fallback
                
                scrolls.push({
                    x: nearestPlat.x + nearestPlat.w / 2 - 12,
                    y: nearestPlat.y - 70, // floating above
                    w: 24,
                    h: 20,
                    collected: false,
                    baseY: nearestPlat.y - 70
                });
            });

            // Reset player
            player.x = 80;
            player.y = 320;
            player.vx = 0;
            player.vy = 0;
            player.onGround = false;
            player.invincibleTimer = 0;

            createParticles();
        }

        // Setup Controls
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') {
                handleJumpPress();
            }
            initAudio();
        });

        window.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        function checkMobile() {
            isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
        }
        checkMobile();

        // Mouse/Touch clicks (Desktop & Mobile)
        canvas.addEventListener('mousedown', handleMouseDown);

        function handleMouseDown(e) {
            initAudio();
            const pos = getCanvasCoordinates(e);
            handleInteractionStart(pos);
        }

        // Multi-touch Events (Mobile Controls)
        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
        canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

        function handleTouchStart(e) {
            e.preventDefault();
            initAudio();
            
            if (gameState === STATES.PLAYING) {
                const rect = canvas.getBoundingClientRect();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    const tx = (touch.clientX - rect.left) * (800 / rect.width);
                    const ty = (touch.clientY - rect.top) * (450 / rect.height);
                    
                    // Jump button hit zone: X in [630, 800], Y in [250, 450]
                    if (tx >= 630 && tx <= 800 && ty >= 250 && ty <= 450) {
                        touchControls.jump = true;
                        handleJumpPress();
                    }
                }
                updateTouchControls(e);
            } else {
                const pos = getCanvasCoordinates(e.changedTouches[0]);
                handleInteractionStart(pos);
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (gameState === STATES.PLAYING) {
                updateTouchControls(e);
            }
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            if (gameState === STATES.PLAYING) {
                updateTouchControls(e);
                
                // Check if jump touch was released
                const rect = canvas.getBoundingClientRect();
                let jumpStillTouched = false;
                for (let i = 0; i < e.touches.length; i++) {
                    const touch = e.touches[i];
                    const tx = (touch.clientX - rect.left) * (800 / rect.width);
                    const ty = (touch.clientY - rect.top) * (450 / rect.height);
                    if (tx >= 630 && tx <= 800 && ty >= 250 && ty <= 450) {
                        jumpStillTouched = true;
                    }
                }
                if (!jumpStillTouched) {
                    touchControls.jump = false;
                }
            }
        }

        function updateTouchControls(e) {
            if (gameState !== STATES.PLAYING) return;
            
            // Reset movements
            touchControls.left = false;
            touchControls.right = false;
            
            const rect = canvas.getBoundingClientRect();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                const tx = (touch.clientX - rect.left) * (800 / rect.width);
                const ty = (touch.clientY - rect.top) * (450 / rect.height);
                
                // Left Zone: X in [0, 130], Y in [250, 450]
                if (tx >= 0 && tx <= 130 && ty >= 250 && ty <= 450) {
                    touchControls.left = true;
                }
                // Right Zone: X in [130, 260], Y in [250, 450]
                if (tx > 130 && tx <= 260 && ty >= 250 && ty <= 450) {
                    touchControls.right = true;
                }
            }
        }

        function handleInteractionStart(pos) {
            if (gameState === STATES.MENU) {
                // Check play button
                if (pos.x >= 300 && pos.x <= 500 && pos.y >= 270 && pos.y <= 325) {
                    playSound('jump');
                    startGame();
                }
                // Hub button
                if (pos.x >= 300 && pos.x <= 500 && pos.y >= 345 && pos.y <= 395) {
                    window.location.href = './index.html';
                }
            } else if (gameState === STATES.PORTAL_QUIZ) {
                if (showFeedbackTimer > 0) return;

                // Check 4 options buttons
                // Box coordinates: Option A/B (y=180 to 240), Option C/D (y=260 to 320)
                // Left column: x=120 to 390. Right column: x=410 to 680.
                let clickedOpt = -1;
                if (pos.y >= 180 && pos.y <= 240) {
                    if (pos.x >= 120 && pos.x <= 390) clickedOpt = 0;
                    if (pos.x >= 410 && pos.x <= 680) clickedOpt = 1;
                } else if (pos.y >= 260 && pos.y <= 320) {
                    if (pos.x >= 120 && pos.x <= 390) clickedOpt = 2;
                    if (pos.x >= 410 && pos.x <= 680) clickedOpt = 3;
                }

                if (clickedOpt !== -1) {
                    checkQuizAnswer(clickedOpt);
                }
            } else if (gameState === STATES.GAMEOVER || gameState === STATES.VICTORY) {
                // Restart Button
                if (pos.x >= 220 && pos.x <= 380 && pos.y >= 310 && pos.y <= 360) {
                    playSound('jump');
                    restartGame();
                }
                // Hub Button
                if (pos.x >= 420 && pos.x <= 580 && pos.y >= 310 && pos.y <= 360) {
                    window.location.href = './index.html';
                }
            }
        }

        function getCanvasCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: (clientX - rect.left) * (800 / rect.width),
                y: (clientY - rect.top) * (450 / rect.height)
            };
        }

        function startGame() {
            score = 0;
            lives = 3;
            currentEra = 0;
            loadLevel(currentEra);
            gameState = STATES.PLAYING;
        }

        function restartGame() {
            startGame();
        }

        function handleJumpPress() {
            if (gameState !== STATES.PLAYING) return;
            if (player.onGround) {
                player.vy = PHYSICS.jumpForce;
                player.onGround = false;
                player.doubleJumpAvailable = true;
                playSound('jump');
            } else if (player.doubleJumpAvailable) {
                player.vy = PHYSICS.jumpForce * 0.85;
                player.doubleJumpAvailable = false;
                playSound('jump');
                // double jump particles
                for (let i = 0; i < 8; i++) {
                    particles.push({
                        x: player.x + player.w/2,
                        y: player.y + player.h,
                        size: 2 + Math.random()*3,
                        vx: (Math.random() - 0.5) * 4,
                        vy: Math.random() * 2,
                        rot: 0,
                        rotSpeed: 0
                    });
                }
            }
        }

        function checkAABB(a, b) {
            return a.x < b.x + b.w &&
                   a.x + a.w > b.x &&
                   a.y < b.y + b.h &&
                   a.y + a.h > b.y;
        }

        function openPortalQuiz() {
            gameState = STATES.PORTAL_QUIZ;
            // Get random question for the current era
            const eraPool = ERA_QUESTIONS[currentEra];
            activeQuiz = eraPool[Math.floor(Math.random() * eraPool.length)];
            quizTimer = 30;
            quizTimerStart = Date.now();
            selectedOption = -1;
            showFeedbackTimer = 0;
        }

        function checkQuizAnswer(optIndex) {
            selectedOption = optIndex;
            showFeedbackTimer = 120; // 2 seconds

            if (optIndex === activeQuiz.correct) {
                feedbackCorrect = true;
                score += 300;
                playSound('correct');
            } else {
                feedbackCorrect = false;
                lives--;
                playSound('wrong');
            }
        }

        // Game loop updates
        let camX = 0;

        function update() {
            if (gameState === STATES.PLAYING) {
                gameTime++;

                if (player.invincibleTimer > 0) player.invincibleTimer--;

                // Inputs
                let dx = 0;
                if (keys['ArrowLeft'] || keys['KeyA'] || touchControls.left) {
                    dx = -PHYSICS.moveSpeed;
                }
                if (keys['ArrowRight'] || keys['KeyD'] || touchControls.right) {
                    dx = PHYSICS.moveSpeed;
                }

                player.vx = dx;
                player.vy += PHYSICS.gravity;

                // Move X
                player.x += player.vx;
                platforms.forEach(plat => {
                    if (checkAABB(player, plat)) {
                        if (player.vx > 0) player.x = plat.x - player.w;
                        if (player.vx < 0) player.x = plat.x + plat.w;
                    }
                });

                // Move Y
                player.y += player.vy;
                player.onGround = false;
                platforms.forEach(plat => {
                    if (checkAABB(player, plat)) {
                        if (player.vy > 0) {
                            player.y = plat.y - player.h;
                            player.vy = 0;
                            player.onGround = true;
                            player.doubleJumpAvailable = true;
                        }
                        if (player.vy < 0) {
                            player.y = plat.y + plat.h;
                            player.vy = 0;
                        }
                    }
                });

                // Spikes hit
                spikes.forEach(spk => {
                    if (checkAABB(player, spk)) {
                        if (player.invincibleTimer === 0) {
                            playSound('hit');
                            lives--;
                            player.invincibleTimer = 90;
                            player.vy = -6;
                            if (lives <= 0) {
                                gameState = STATES.GAMEOVER;
                                playSound('gameover');
                            }
                        }
                    }
                });

                // Boundary check
                if (player.x < 0) player.x = 0;
                if (player.y > 450) {
                    playSound('hit');
                    lives--;
                    player.x = Math.max(80, player.x - 300);
                    player.y = 150;
                    player.vy = 0;
                    if (lives <= 0) {
                        gameState = STATES.GAMEOVER;
                        playSound('gameover');
                    }
                }

                // Camera scroll
                const targetCamX = player.x - 300;
                camX += (targetCamX - camX) * 0.1;
                camX = Math.max(0, Math.min(camX, LEVEL_WIDTH - 800));

                // Scroll pickup
                scrolls.forEach(sc => {
                    if (!sc.collected) {
                        // Float bounce animation
                        sc.y = sc.baseY + Math.sin(Date.now() / 250) * 5;
                        if (checkAABB(player, sc)) {
                            sc.collected = true;
                            scrollsCollected++;
                            score += 50;
                            playSound('collect');
                            if (scrollsCollected >= 3) {
                                portal.active = true;
                            }
                        }
                    }
                });

                // Portal hit
                if (checkAABB(player, portal)) {
                    if (portal.active) {
                        openPortalQuiz();
                    }
                }

                // Enemy patrols & collisions
                enemies.forEach(e => {
                    if (e.type === 'mosquito') {
                        // sine wave hover
                        e.phase += 0.06;
                        e.y += Math.sin(e.phase) * 1.0;
                    }

                    e.x += e.vx * e.dir;
                    if (e.x <= e.patrolMin) {
                        e.x = e.patrolMin;
                        e.dir = 1;
                    }
                    if (e.x >= e.patrolMax) {
                        e.x = e.patrolMax;
                        e.dir = -1;
                    }

                    if (checkAABB(player, e)) {
                        if (player.invincibleTimer === 0) {
                            playSound('hit');
                            lives--;
                            player.invincibleTimer = 90;
                            player.vy = -5;
                            player.vx = e.dir * 4;

                            if (lives <= 0) {
                                gameState = STATES.GAMEOVER;
                                playSound('gameover');
                            }
                        }
                    }
                });

                // Particle drift
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.rot += p.rotSpeed;
                    if (p.x < -10) {
                        p.x = 810;
                        p.y = Math.random() * 450;
                    }
                });
            } else if (gameState === STATES.PORTAL_QUIZ) {
                if (showFeedbackTimer > 0) {
                    showFeedbackTimer--;
                    if (showFeedbackTimer === 0) {
                        if (feedbackCorrect) {
                            if (currentEra < 3) {
                                currentEra++;
                                loadLevel(currentEra);
                                playSound('erachange');
                                gameState = STATES.PLAYING;
                            } else {
                                gameState = STATES.VICTORY;
                                playSound('victory');
                            }
                        } else {
                            // Reset portal & scrolls upon wrong answer
                            scrollsCollected = 0;
                            portal.active = false;
                            scrolls.forEach(sc => {
                                sc.collected = false;
                            });
                            // Push player away from portal
                            player.x = portal.x - 120;
                            player.vx = -4;
                            gameState = STATES.PLAYING;

                            if (lives <= 0) {
                                gameState = STATES.GAMEOVER;
                                playSound('gameover');
                            }
                        }
                    }
                } else {
                    const elapsed = (Date.now() - quizTimerStart) / 1000;
                    quizTimer = Math.max(0, 30 - elapsed);
                    if (quizTimer <= 0) {
                        checkQuizAnswer(-1); // time out
                    }
                }
            } else if (gameState === STATES.MENU) {
                // slow particle drift
                particles.forEach(p => {
                    p.x += p.vx * 0.4;
                    p.y += p.vy * 0.4;
                    if (p.x < -10) {
                        p.x = 810;
                        p.y = Math.random() * 450;
                    }
                });
            }
        }

        // Draw components
        function draw() {
            ctx.clearRect(0, 0, 800, 450);

            const era = ERAS[currentEra];
            
            // Linear Gradient background
            let bgGrad = ctx.createLinearGradient(0, 0, 0, 450);
            bgGrad.addColorStop(0, era.bgTop);
            bgGrad.addColorStop(1, era.bgBot);
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, 800, 450);

            // Draw Background details per Era
            ctx.fillStyle = 'rgba(255,255,255,0.015)';
            if (currentEra === 0) {
                // Palm tree silhouettes in the background
                for (let i = 0; i < 4; i++) {
                    const tx = (i * 240 - camX * 0.25) % 900;
                    ctx.beginPath();
                    ctx.moveTo(tx, 390);
                    ctx.lineTo(tx + 20, 200);
                    ctx.lineTo(tx + 40, 390);
                    ctx.fill();
                }
            } else if (currentEra === 1) {
                // Ship silhouettes in background
                for (let i = 0; i < 3; i++) {
                    const sx = (i * 300 - camX * 0.15) % 900;
                    ctx.fillRect(sx, 320, 60, 20);
                    ctx.beginPath();
                    ctx.moveTo(sx + 30, 320);
                    ctx.lineTo(sx + 30, 280);
                    ctx.lineTo(sx + 50, 300);
                    ctx.fill();
                }
            } else if (currentEra === 2) {
                // Palace arches outline
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
                ctx.lineWidth = 4;
                for (let i = 0; i < 5; i++) {
                    const ax = (i * 200 - camX * 0.2) % 900;
                    ctx.beginPath();
                    ctx.arc(ax + 50, 390, 80, Math.PI, 0);
                    ctx.stroke();
                }
            } else if (currentEra === 3) {
                // Building block silhouettes
                ctx.fillStyle = 'rgba(255, 255, 255, 0.01)';
                for (let i = 0; i < 6; i++) {
                    const bx = (i * 150 - camX * 0.25) % 900;
                    ctx.fillRect(bx, 150 + (i % 3) * 50, 80, 240);
                }
            }

            // Draw floating particles
            particles.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                
                if (era.particle === 'leaf') {
                    // Leaf particle green
                    ctx.fillStyle = 'rgba(34, 197, 94, 0.25)';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, p.size, p.size / 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else if (era.particle === 'ship') {
                    // Colonial coin / brown circle
                    ctx.fillStyle = 'rgba(245, 158, 11, 0.2)';
                    ctx.beginPath();
                    ctx.arc(0, 0, p.size, 0, Math.PI * 2);
                    ctx.fill();
                } else if (era.particle === 'star') {
                    // Star / Yellow cross
                    ctx.fillStyle = 'rgba(251, 191, 36, 0.3)';
                    ctx.fillRect(-p.size/2, -1, p.size, 2);
                    ctx.fillRect(-1, -p.size/2, 2, p.size);
                } else if (era.particle === 'gear') {
                    // Modernization square/dot
                    ctx.fillStyle = 'rgba(96, 165, 250, 0.2)';
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                }
                ctx.restore();
            });

            if (gameState === STATES.MENU) {
                drawMenu();
                return;
            }

            // LEVEL GAMEPLAY (Camera scrolled)
            ctx.save();
            ctx.translate(-camX, 0);

            // Draw Platforms
            platforms.forEach(plat => {
                let platGrad = ctx.createLinearGradient(plat.x, plat.y, plat.x, plat.y + 100);
                platGrad.addColorStop(0, era.platColor);
                platGrad.addColorStop(1, '#080d19');
                ctx.fillStyle = platGrad;
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);

                // Top rim highlight
                ctx.fillStyle = era.accent;
                ctx.fillRect(plat.x, plat.y, plat.w, 4);
            });

            // Draw Spikes
            spikes.forEach(spk => {
                ctx.fillStyle = '#f87171';
                const sWidth = 16;
                const count = Math.ceil(spk.w / sWidth);
                for (let i = 0; i < count; i++) {
                    ctx.beginPath();
                    ctx.moveTo(spk.x + i * sWidth, spk.y + spk.h);
                    ctx.lineTo(spk.x + i * sWidth + sWidth/2, spk.y);
                    ctx.lineTo(spk.x + (i + 1) * sWidth, spk.y + spk.h);
                    ctx.fill();
                }
            });

            // Draw Scrolls (📜)
            scrolls.forEach(sc => {
                if (!sc.collected) {
                    // Scroll parchment paper rect
                    ctx.fillStyle = '#fef3c7';
                    ctx.fillRect(sc.x, sc.y, sc.w, sc.h);
                    // Red ribbon band
                    ctx.fillStyle = '#dc2626';
                    ctx.fillRect(sc.x + sc.w/2 - 3, sc.y, 6, sc.h);
                    // Border
                    ctx.strokeStyle = '#d97706';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(sc.x, sc.y, sc.w, sc.h);
                }
            });

            // Draw NPC Guide
            const npcPulse = Math.sin(Date.now() / 250) * 3;
            // Guide body: Blue coat
            ctx.fillStyle = '#3b82f6';
            ctx.fillRect(npc.x, npc.y + npcPulse, npc.w, npc.h);
            // Guide head
            ctx.fillStyle = '#fde047';
            ctx.beginPath();
            ctx.arc(npc.x + npc.w/2, npc.y - 8 + npcPulse, 8, 0, Math.PI*2);
            ctx.fill();
            // Hair / Glasses
            ctx.fillStyle = '#94a3b8';
            ctx.fillRect(npc.x - 2, npc.y - 16 + npcPulse, npc.w + 4, 6); // grey wig/hair
            
            // Speech Bubble (If player is close)
            if (Math.abs(player.x - npc.x) < 160) {
                // rounded rect speech container
                drawRoundRect(npc.x - 120, npc.y - 75, 240, 48, 10, 'rgba(15, 23, 42, 0.95)', '#f59e0b');
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px Nunito';
                ctx.textAlign = 'center';
                // Splitted text to wrap nicely
                const txt = npc.fact;
                ctx.fillText(txt, npc.x, npc.y - 48);
            }

            // Draw Portal
            const portTime = Date.now() / 600;
            ctx.save();
            ctx.translate(portal.x + portal.w/2, portal.y + portal.h/2);
            
            if (portal.active) {
                // Spinning golden vortex
                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2 + portTime;
                    const r = 24 + Math.sin(portTime * 4 + i) * 8;
                    ctx.fillStyle = `hsla(${era.accentHue + i * 20}, 100%, 65%, 0.85)`;
                    ctx.beginPath();
                    ctx.arc(Math.cos(angle) * r, Math.sin(angle) * r, 5 + i/3, 0, Math.PI*2);
                    ctx.fill();
                }
            } else {
                // Dim gray outline portal
                ctx.strokeStyle = '#475569';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, 24, 0, Math.PI*2);
                ctx.stroke();
                
                ctx.fillStyle = '#64748b';
                ctx.font = 'bold 10px Nunito';
                ctx.textAlign = 'center';
                ctx.fillText('PORTAL', 0, -32);
                ctx.fillText('INATIVO', 0, 38);
            }
            ctx.restore();

            // Draw Enemies
            enemies.forEach(e => {
                const cx = e.x + e.w/2;
                const cy = e.y + e.h/2;

                if (e.type === 'onca') {
                    // Era 1: Onça Pintada - Spotted orange circle
                    ctx.fillStyle = '#f59e0b';
                    ctx.beginPath();
                    ctx.arc(cx, cy, e.w/2, 0, Math.PI*2);
                    ctx.fill();
                    // spots
                    ctx.fillStyle = '#78350f';
                    ctx.beginPath();
                    ctx.arc(cx - 5, cy - 2, 2, 0, Math.PI*2);
                    ctx.arc(cx + 5, cy + 3, 2, 0, Math.PI*2);
                    ctx.arc(cx, cy + 5, 1.5, 0, Math.PI*2);
                    ctx.fill();
                    // ears
                    ctx.beginPath();
                    ctx.moveTo(cx - 10, cy - 8);
                    ctx.lineTo(cx - 12, cy - 14);
                    ctx.lineTo(cx - 4, cy - 10);
                    ctx.moveTo(cx + 10, cy - 8);
                    ctx.lineTo(cx + 12, cy - 14);
                    ctx.lineTo(cx + 4, cy - 10);
                    ctx.fill();
                } else if (e.type === 'mosquito') {
                    // Era 2: Mosquito - Tiny flapping insect
                    ctx.fillStyle = '#475569';
                    ctx.beginPath();
                    ctx.moveTo(cx, cy - 6);
                    ctx.lineTo(cx - 6, cy + 6);
                    ctx.lineTo(cx + 6, cy + 6);
                    ctx.closePath();
                    ctx.fill();
                    
                    // Wings flapping
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    const wingSpread = Math.sin(Date.now() / 50) * 12;
                    ctx.beginPath();
                    ctx.ellipse(cx - 5, cy - 2, 8, Math.abs(wingSpread)/2, -0.4, 0, Math.PI*2);
                    ctx.ellipse(cx + 5, cy - 2, 8, Math.abs(wingSpread)/2, 0.4, 0, Math.PI*2);
                    ctx.fill();
                } else if (e.type === 'guard') {
                    // Era 3: Royal Guard - Soldier rectangular
                    ctx.fillStyle = '#dc2626'; // Red uniform
                    ctx.fillRect(e.x, e.y, e.w, e.h);
                    
                    ctx.fillStyle = '#1e3a8a'; // Blue trousers
                    ctx.fillRect(e.x, e.y + e.h - 6, e.w, 6);
                    
                    ctx.fillStyle = '#000'; // Black hat
                    ctx.fillRect(e.x - 2, e.y - 8, e.w + 4, 8);
                    
                    // Golden button stripe
                    ctx.fillStyle = '#fbbf24';
                    ctx.fillRect(cx - 1.5, e.y + 4, 3, 10);
                } else if (e.type === 'car') {
                    // Era 4: Old Car
                    ctx.fillStyle = '#334155'; // Car body
                    ctx.fillRect(e.x, e.y + 6, e.w, e.h - 6);
                    ctx.fillRect(e.x + 6, e.y, e.w - 12, 6); // cabin
                    
                    // Wheels
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(e.x + 6, e.y + e.h - 2, 5, 0, Math.PI*2);
                    ctx.arc(e.x + e.w - 6, e.y + e.h - 2, 5, 0, Math.PI*2);
                    ctx.fill();
                }
            });

            // Draw Player (Explorer)
            const blink = player.invincibleTimer > 0 && Math.floor(Date.now() / 100) % 2 === 0;
            if (!blink) {
                const px = player.x;
                const py = player.y;
                
                // Body: tan/brown coat
                ctx.fillStyle = '#b45309';
                ctx.fillRect(px, py, player.w, player.h);

                // Scarf: orange detail
                ctx.fillStyle = '#ea580c';
                ctx.fillRect(px, py + 6, player.w, 4);

                // Explorer Hat
                ctx.fillStyle = '#78350f';
                ctx.fillRect(px - 3, py - 4, player.w + 6, 4); // brim
                ctx.fillRect(px + 2, py - 9, player.w - 4, 5); // top

                // Face details (Eyes)
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(px + 6, py + 3, 3, 0, Math.PI*2);
                ctx.arc(px + player.w - 6, py + 3, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(px + 6, py + 3, 1, 0, Math.PI*2);
                ctx.arc(px + player.w - 6, py + 3, 1, 0, Math.PI*2);
                ctx.fill();
            }

            ctx.restore(); // end scroll transform

            // Absolute HUD Overlays
            drawHUD();

            // Mobile virtual buttons
            if (isMobile) {
                drawMobileControls();
            }

            // State specific displays
            if (gameState === STATES.PORTAL_QUIZ) {
                drawQuizOverlay();
            } else if (gameState === STATES.GAMEOVER) {
                drawGameOver();
            } else if (gameState === STATES.VICTORY) {
                drawVictory();
            }
        }

        // Canvas Rendering Helpers
        function drawRoundRect(x, y, w, h, radius, fill, stroke) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + w - radius, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
            ctx.lineTo(x + w, y + h - radius);
            ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
            ctx.lineTo(x + radius, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            if (fill) {
                ctx.fillStyle = fill;
                ctx.fill();
            }
            if (stroke) {
                ctx.strokeStyle = stroke;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        // Draw HUD
        function drawHUD() {
            // Stats bar container
            ctx.fillStyle = 'rgba(15, 23, 42, 0.75)';
            drawRoundRect(10, 10, 780, 42, 8, 'rgba(15,23,42,0.75)', 'rgba(30,41,59,0.5)');

            // Hearts (lives)
            let heartsStr = '';
            for (let i = 0; i < 3; i++) {
                heartsStr += i < lives ? '❤️' : '🖤';
            }
            ctx.textAlign = 'left';
            ctx.font = '16px Nunito';
            ctx.fillStyle = '#fff';
            ctx.fillText(`HP: ${heartsStr}`, 25, 36);

            // Document Scrolls count
            ctx.fillStyle = '#fbbf24';
            ctx.fillText(`Documentos: 📜 ${scrollsCollected}/3`, 175, 36);

            // Current Era
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px Nunito';
            ctx.fillText(`${ERAS[currentEra].name} (${ERAS[currentEra].period})`, 440, 36);

            // Score
            ctx.textAlign = 'right';
            ctx.fillStyle = '#f59e0b';
            ctx.fillText(`Pontos: ${score}`, 775, 36);
        }

            ctx.textAlign = 'center';

        // Draw Mobile virtual controls
        function drawMobileControls() {
            ctx.save();
            ctx.globalAlpha = 0.55;
            
            // Left Button (Circle with Arrow)
            const leftActive = touchControls.left;
            ctx.fillStyle = leftActive ? '#3b82f6' : '#1e293b';
            ctx.strokeStyle = leftActive ? '#60a5fa' : '#475569';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(60, 390, 30, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Nunito';
            ctx.textAlign = 'center';
            ctx.fillText('◀', 60, 398);

            // Right Button (Circle with Arrow)
            const rightActive = touchControls.right;
            ctx.fillStyle = rightActive ? '#3b82f6' : '#1e293b';
            ctx.strokeStyle = rightActive ? '#60a5fa' : '#475569';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(140, 390, 30, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = '#fff';
            ctx.fillText('▶', 140, 398);

            // Jump Button (Green circle with text)
            const jumpActive = touchControls.jump;
            ctx.fillStyle = jumpActive ? '#10b981' : '#064e3b';
            ctx.strokeStyle = jumpActive ? '#34d399' : '#047857';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(730, 385, 35, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px Nunito';
            ctx.fillText('SALTAR', 730, 389);

            ctx.restore();
        }

        // Draw Quiz Portal Overlay
        function drawQuizOverlay() {
            ctx.fillStyle = 'rgba(5, 7, 15, 0.92)';
            ctx.fillRect(0, 0, 800, 450);

            const eraAccent = ERAS[currentEra].accent;
            drawRoundRect(80, 40, 640, 370, 16, '#0f172a', eraAccent);

            ctx.fillStyle = eraAccent;
            ctx.font = 'bold 15px Nunito';
            ctx.textAlign = 'center';
            ctx.fillText(`PORTAL DO TEMPO ATIVO: QUESTÃO DA ERA`, 400, 70);

            // Question text
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Nunito';
            ctx.fillText(activeQuiz.q, 400, 110);

            // Timer bar
            const timerPct = quizTimer / 30;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fillRect(120, 145, 560, 10);
            ctx.fillStyle = timerPct > 0.3 ? '#10b981' : '#ef4444';
            ctx.fillRect(120, 145, 560 * timerPct, 10);

            // 4 options buttons
            const optCoords = [
                { x: 120, y: 180, w: 270, h: 60 },
                { x: 410, y: 180, w: 270, h: 60 },
                { x: 120, y: 260, w: 270, h: 60 },
                { x: 410, y: 260, w: 270, h: 60 }
            ];

            activeQuiz.opts.forEach((opt, idx) => {
                const coord = optCoords[idx];
                let bgBtn = '#1e293b';
                let strokeBtn = '#334155';
                let textBtnColor = '#fff';

                if (showFeedbackTimer > 0) {
                    if (idx === activeQuiz.correct) {
                        bgBtn = '#065f46';
                        strokeBtn = '#10b981';
                    } else if (idx === selectedOption) {
                        bgBtn = '#7f1d1d';
                        strokeBtn = '#ef4444';
                    } else {
                        bgBtn = '#0f172a';
                        strokeBtn = '#1e293b';
                        textBtnColor = '#64748b';
                    }
                } else if (selectedOption === idx) {
                    bgBtn = '#3b82f6';
                    strokeBtn = '#60a5fa';
                }

                drawRoundRect(coord.x, coord.y, coord.w, coord.h, 8, bgBtn, strokeBtn);

                ctx.fillStyle = textBtnColor;
                ctx.font = 'bold 14px Nunito';
                ctx.textAlign = 'center';
                
                // Wrap text if long
                if (opt.length > 35) {
                    const words = opt.split(' ');
                    const half = Math.ceil(words.length / 2);
                    const line1 = words.slice(0, half).join(' ');
                    const line2 = words.slice(half).join(' ');
                    ctx.fillText(line1, coord.x + coord.w/2, coord.y + coord.h/2 - 3);
                    ctx.fillText(line2, coord.x + coord.w/2, coord.y + coord.h/2 + 13);
                } else {
                    ctx.fillText(opt, coord.x + coord.w/2, coord.y + coord.h/2 + 5);
                }
            });

            // Feedback Message
            if (showFeedbackTimer > 0) {
                ctx.fillStyle = feedbackCorrect ? '#34d399' : '#f87171';
                ctx.font = 'bold 16px Nunito';
                ctx.textAlign = 'center';
                const feedMsg = feedbackCorrect ? '✓ RESPOSTA CORRETA! Viajando no tempo... ⏳' : '✗ RESPOSTA INCORRETA! Portal descarregado, -1 Coração! Pegue os pergaminhos de novo.';
                ctx.fillText(feedMsg, 400, 360);
            } else {
                ctx.fillStyle = '#94a3b8';
                ctx.font = '13px Nunito';
                ctx.textAlign = 'center';
                ctx.fillText('Responda corretamente para ativar o portal temporal e viajar de Era!', 400, 360);
            }
        }

        // Draw Game Over Screen
        function drawGameOver() {
            ctx.fillStyle = 'rgba(5, 7, 15, 0.95)';
            ctx.fillRect(0, 0, 800, 450);

            ctx.fillStyle = '#ef4444';
            ctx.font = 'black 48px Nunito';
            ctx.textAlign = 'center';
            ctx.fillText('TEMPO ESGOTADO OU SEM VIDAS', 400, 150);

            ctx.fillStyle = '#e2e8f0';
            ctx.font = 'bold 20px Nunito';
            ctx.fillText(`Sua Pontuação de História: ${score} pontos`, 400, 200);

            ctx.fillStyle = '#fda4af';
            ctx.font = '16px Nunito';
            ctx.fillText('A Prô Vitória incentiva você a revisar a matéria de história e tentar de novo!', 400, 240);

            // Restart Button
            drawRoundRect(220, 310, 160, 50, 8, '#ef4444', '#b91c1c');
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Nunito';
            ctx.fillText('REINICIAR', 300, 342);

            // Hub Button
            drawRoundRect(420, 310, 160, 50, 8, '#334155', '#1e293b');
            ctx.fillStyle = '#fff';
            ctx.fillText('VOLTAR AO HUB', 500, 342);
        }

        // Draw Victory Screen
        function drawVictory() {
            ctx.fillStyle = 'rgba(5, 7, 15, 0.95)';
            ctx.fillRect(0, 0, 800, 450);

            // Confetti in yellow and green (Brazilian theme)
            for (let i = 0; i < 24; i++) {
                const cx = (i * 37 + Date.now()/12) % 800;
                const cy = (i * 29 + Date.now()/10) % 450;
                ctx.fillStyle = i % 2 === 0 ? '#22c55e' : '#eab308';
                ctx.fillRect(cx, cy, 7, 7);
            }

            ctx.fillStyle = '#22c55e';
            ctx.font = 'black 44px Nunito';
            ctx.textAlign = 'center';
            ctx.fillText('EXPLORADOR HISTÓRICO MÁXIMO! 🏆🎉', 400, 140);

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Nunito';
            ctx.fillText(`Parabéns! Você completou com sucesso a Linha do Tempo do Brasil!`, 400, 190);
            ctx.fillStyle = '#fbbf24';
            ctx.fillText(`Pontuação Final: ${score} pontos históricos!`, 400, 225);

            ctx.fillStyle = '#fda4af';
            ctx.font = '16px Nunito';
            ctx.fillText('GamesForVitória 💖 Criado com carinho pedagógico para a Prô Vitória.', 400, 260);

            // Play again Button
            drawRoundRect(220, 310, 160, 50, 8, '#10b981', '#047857');
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Nunito';
            ctx.fillText('JOGAR DE NOVO', 300, 342);

            // Hub Button
            drawRoundRect(420, 310, 160, 50, 8, '#334155', '#1e293b');
            ctx.fillStyle = '#fff';
            ctx.fillText('VOLTAR AO HUB', 500, 342);
        }

        // Loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Orientation Checker for mobile
        function checkOrientation() {
            const overlay = document.getElementById('rotate-overlay');
            if (overlay) {
                if (window.innerHeight > window.innerWidth) {
                    overlay.classList.remove('hidden');
                } else {
                    overlay.classList.add('hidden');
                }
            }
        }
        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', checkOrientation);
        checkOrientation();

        createParticles();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
