<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HistóriaCorrida: Fuga pelo Tempo</title>
    <!-- Google Fonts Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <!-- Botão Flutuante de Tela Cheia -->
        <button id="fullscreen-btn" onclick="toggleFullscreen()" class="absolute top-4 right-4 bg-slate-900/80 border border-slate-700 hover:bg-slate-800 text-slate-300 p-2.5 rounded-2xl shadow-md transition-transform active:scale-95 flex items-center justify-center z-40" title="Tela Cheia">
            <i id="fullscreen-icon" data-lucide="maximize" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- Device Rotation Alert Overlay -->
    <div id="rotate-overlay" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#04080f] text-white text-center p-6">
        <div class="animate-bounce text-6xl mb-4">📱🔄</div>
        <h2 class="text-2xl font-black mb-2 text-rose-400">Gire o seu aparelho!</h2>
        <p class="text-slate-400 max-w-sm">Para uma melhor experiência de jogo, gire o seu celular para a horizontal (modo paisagem).</p>
    </div>

    <!-- Game Engine Configs -->
    <script>
        // Global Game States enum
        const STATES = {
            MENU: 'menu',
            PLAYING: 'playing',
            PORTAL_QUIZ: 'portal_quiz',
            GAMEOVER: 'gameover',
            VICTORY: 'victory'
        };

        // Era Specifications
        const ERAS = [
            {
                name: 'Brasil Pré-Colonial',
                period: 'Antes de 1500',
                bgTop: '#0a1a08',
                bgBot: '#1a3a10',
                platColor: '#2d5a1b',
                accent: '#22c55e',
                accentHue: 120,
                npcFact: '🌿 Existiam mais de 1.000 povos indígenas no Brasil antes de 1500!',
                particle: 'leaf'
            },
            {
                name: 'Brasil Colonial',
                period: '1500 – 1822',
                bgTop: '#1a0f00',
                bgBot: '#3d2200',
                platColor: '#78350f',
                accent: '#f59e0b',
                accentHue: 35,
                npcFact: '⛵ Cabral chegou em 22 de abril de 1500 em Porto Seguro, na Bahia!',
                particle: 'ship'
            },
            {
                name: 'Brasil Império',
                period: '1822 – 1889',
                bgTop: '#0f0a1a',
                bgBot: '#1e103a',
                platColor: '#4c1d95',
                accent: '#fbbf24',
                accentHue: 45,
                npcFact: '☕ O café financiou cerca de 70% de toda a economia imperial!',
                particle: 'star'
            },
            {
                name: 'Brasil República',
                period: '1889 – hoje',
                bgTop: '#0a0f1a',
                bgBot: '#1a2540',
                platColor: '#1e3a5f',
                accent: '#60a5fa',
                accentHue: 210,
                npcFact: '🏙️ Brasília foi construída e inaugurada em apenas 41 meses!',
                particle: 'gear'
            }
        ];
    </script>

    <!-- Project Modular Files (OOP) -->
    <script src="js/audio.js"></script>
    <script src="js/controles.js"></script>
    <script src="js/entidades.js"></script>
    <script src="js/quiz.js"></script>
    <script src="js/interface.js"></script>
    <script src="js/jogo.js"></script>

    <!-- DOM Fullscreen Handlers -->
    <script>
        function toggleFullscreen() {
            const icon = document.getElementById('fullscreen-icon');
            const docEl = document.documentElement;
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                const req = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
                if (req) {
                    try {
                        const promise = req.call(docEl);
                        if (promise && promise.then) {
                            promise.then(() => {
                                if (icon) icon.setAttribute('data-lucide', 'minimize');
                                lucide.createIcons();
                            }).catch(err => console.log(err));
                        } else {
                            if (icon) icon.setAttribute('data-lucide', 'minimize');
                            lucide.createIcons();
                        }
                    } catch(e) { console.log(e); }
                }
            } else {
                const exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
                if (exit) {
                    try {
                        const promise = exit.call(document);
                        if (promise && promise.then) {
                            promise.then(() => {
                                if (icon) icon.setAttribute('data-lucide', 'maximize');
                                lucide.createIcons();
                            }).catch(err => console.log(err));
                        } else {
                            if (icon) icon.setAttribute('data-lucide', 'maximize');
                            lucide.createIcons();
                        }
                    } catch(e) { console.log(e); }
                }
            }
        }

        function updateFullscreenIcon() {
            const icon = document.getElementById('fullscreen-icon');
            if (icon) {
                if (document.fullscreenElement || document.webkitFullscreenElement) {
                    icon.setAttribute('data-lucide', 'minimize');
                } else {
                    icon.setAttribute('data-lucide', 'maximize');
                }
                lucide.createIcons();
            }
        }

        document.addEventListener('fullscreenchange', updateFullscreenIcon);
        document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const isFullscreenSupported = !!(
                document.documentElement.requestFullscreen ||
                document.documentElement.webkitRequestFullscreen ||
                document.documentElement.mozRequestFullScreen ||
                document.documentElement.msRequestFullscreen
            );
            if (!isFullscreenSupported) {
                const btn = document.getElementById('fullscreen-btn');
                if (btn) btn.classList.add('hidden');
            }

            // Start the game once DOM and modules are loaded
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            window.gameInstance = new Game(canvas, ctx);
        });
    </script>
</body>
</html>
